name: Release

on:
  push:
    tags:
      - 'v*'
      - 'test-v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Create the release as a DRAFT. It is only published at the very end, after
  # every build job has succeeded (see the `finalize` job).
  # ---------------------------------------------------------------------------
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#test-v}
          VERSION=${VERSION#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > notes.md <<'NOTES'
          ### macOS users

          These builds are ad-hoc signed, not notarized. On first launch macOS
          may refuse to open the app. To allow it:

              xattr -cr /Applications/CView.app

          Download the DMG matching your CPU: `arm64` for Apple Silicon
          (M1/M2/M3/M4), `x86_64` for Intel Macs.

          ### Linux users

          The `.deb` requires Ubuntu 24.04 / Debian 13 or newer (libadwaita 1.5).
          Older distributions should use the Flatpak.
          NOTES

          gh release create "${{ github.ref_name }}" \
            --draft \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            --notes-file notes.md

  # ---------------------------------------------------------------------------
  # Windows — MSYS2/UCRT64. Uses the MSYS2 Rust toolchain only; mixing it with
  # the rustup toolchain breaks the x86_64-pc-windows-gnu target.
  # ---------------------------------------------------------------------------
  build-windows:
    needs: create-release
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-nsis

      - name: Build
        env:
          PKG_CONFIG_PATH: /ucrt64/lib/pkgconfig
          LIBRARY_PATH: /ucrt64/lib
        run: |
          set -e
          cargo build --release --locked --target x86_64-pc-windows-gnu

      - name: Bundle DLLs and Assets
        run: |
          set -e
          mkdir -p dist
          cp target/x86_64-pc-windows-gnu/release/cview.exe dist/

          # Dependencies (DLLs)
          ldd target/x86_64-pc-windows-gnu/release/cview.exe \
            | grep '/ucrt64' | awk '{print $3}' | xargs -I '{}' cp -u '{}' dist/

          # GSettings schemas
          mkdir -p dist/share/glib-2.0/schemas
          cp /ucrt64/share/glib-2.0/schemas/* dist/share/glib-2.0/schemas/
          glib-compile-schemas dist/share/glib-2.0/schemas/

          # Icon themes
          mkdir -p dist/share/icons
          cp -r /ucrt64/share/icons/Adwaita dist/share/icons/
          cp -r /ucrt64/share/icons/hicolor dist/share/icons/

          # GDK pixbuf loaders (PNG/SVG icons fail silently without these)
          if [ -d /ucrt64/lib/gdk-pixbuf-2.0 ]; then
            mkdir -p dist/lib
            cp -r /ucrt64/lib/gdk-pixbuf-2.0 dist/lib/
          fi

      - name: Create Installer
        run: |
          set -e
          makensis installer.ini
          sha256sum cview-installer.exe > cview-installer.exe.sha256

      - name: Upload Installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # gh is on the Windows runner's native PATH, NOT inside MSYS2.
        # This step must override the msys2 shell default above.
        shell: bash
        run: |
          set -e
          gh release upload "${{ github.ref_name }}" \
            cview-installer.exe cview-installer.exe.sha256

  # ---------------------------------------------------------------------------
  # macOS — both architectures.
  # NOTE: macos-13 was retired on 2025-12-04. `macos-15-intel` is the current
  # label for x86_64. GitHub plans to end macOS Intel support after the
  # macos-15 image retires in autumn 2027.
  # ---------------------------------------------------------------------------
  build-macos:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-${{ matrix.arch }}

      - name: Install Dependencies
        run: brew install gtk4 libadwaita adwaita-icon-theme

      - name: Build
        run: cargo build --release --locked

      - name: Bundle App
        run: |
          set -euo pipefail

          APP_NAME="CView"
          APP_DIR="$APP_NAME.app"
          BREW_PREFIX=$(brew --prefix)

          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          mkdir -p "$APP_DIR/Contents/Libs"

          cp target/release/cview "$APP_DIR/Contents/MacOS/cview-bin"

          # --- Manual dylib bundling ------------------------------------------
          # Homebrew bottles increasingly report @rpath/... install names, which
          # are not real paths on disk and must be resolved before copying.
          resolve_dep() {
            local dep="$1"
            case "$dep" in
              @rpath/*)
                local base
                base=$(basename "${dep#@rpath/}")
                find "$BREW_PREFIX/lib" "$BREW_PREFIX/opt" \
                     -name "$base" -type f 2>/dev/null | head -n1
                ;;
              *)
                echo "$dep"
                ;;
            esac
          }

          bundle_libs() {
            local binary="$1"
            local deps
            # tail -n +2 skips the binary's own LC_ID_DYLIB line
            deps=$(otool -L "$binary" | tail -n +2 | awk '{print $1}' \
                    | grep -vE "^/usr/lib|^/System/Library|^@executable_path|^@loader_path" || true)

            for dep in $deps; do
              local lib_name real_path target_path
              lib_name=$(basename "$dep")
              target_path="$APP_DIR/Contents/Libs/$lib_name"

              if [ ! -f "$target_path" ]; then
                real_path=$(resolve_dep "$dep")
                if [ -z "$real_path" ] || [ ! -f "$real_path" ]; then
                  echo "WARNING: could not resolve $dep -- skipping"
                  continue
                fi
                echo "Bundling $lib_name"
                cp -L "$real_path" "$target_path"
                chmod 755 "$target_path"
                install_name_tool -id "@executable_path/../Libs/$lib_name" "$target_path"
                bundle_libs "$target_path"
                # Re-sign immediately: install_name_tool invalidates the
                # existing signature, which is fatal at load time on arm64.
                codesign --force --sign - "$target_path"
              fi

              install_name_tool -change "$dep" "@executable_path/../Libs/$lib_name" "$binary" || true
            done

            codesign --force --sign - "$binary"
          }

          echo "Starting recursive bundling..."
          bundle_libs "$APP_DIR/Contents/MacOS/cview-bin"
          echo "Bundling complete."
          # --- End bundling ---------------------------------------------------

          # GSettings schemas
          mkdir -p "$APP_DIR/Contents/Resources/share/glib-2.0/schemas"
          cp "$BREW_PREFIX/share/glib-2.0/schemas/"* \
             "$APP_DIR/Contents/Resources/share/glib-2.0/schemas/"
          glib-compile-schemas "$APP_DIR/Contents/Resources/share/glib-2.0/schemas"

          # Icon themes
          mkdir -p "$APP_DIR/Contents/Resources/share/icons"
          for theme in Adwaita hicolor; do
            if [ -d "$BREW_PREFIX/share/icons/$theme" ]; then
              cp -r "$BREW_PREFIX/share/icons/$theme" \
                    "$APP_DIR/Contents/Resources/share/icons/"
            else
              echo "Warning: $theme icons not found at $BREW_PREFIX/share/icons/$theme"
            fi
          done

          # GDK pixbuf loaders + regenerated cache
          PIXBUF_SRC=$(find "$BREW_PREFIX/lib/gdk-pixbuf-2.0" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -n1)
          if [ -n "$PIXBUF_SRC" ]; then
            PIXBUF_VER=$(basename "$PIXBUF_SRC")
            PIXBUF_DEST="$APP_DIR/Contents/Resources/lib/gdk-pixbuf-2.0/$PIXBUF_VER"
            mkdir -p "$PIXBUF_DEST"
            cp -r "$PIXBUF_SRC/"* "$PIXBUF_DEST/"
            if command -v gdk-pixbuf-query-loaders >/dev/null 2>&1; then
              GDK_PIXBUF_MODULEDIR="$PIXBUF_DEST/loaders" \
                gdk-pixbuf-query-loaders > "$PIXBUF_DEST/loaders.cache" || true
            fi
          fi

          # Launcher script
          cat << 'EOF' > "$APP_DIR/Contents/MacOS/cview"
          #!/bin/sh
          DIR=$(cd "$(dirname "$0")" && pwd)
          RES="$DIR/../Resources"
          export GSETTINGS_SCHEMA_DIR="$RES/share/glib-2.0/schemas"
          export XDG_DATA_DIRS="$RES/share"
          export GTK_DATA_PREFIX="$RES"
          CACHE=$(ls "$RES"/lib/gdk-pixbuf-2.0/*/loaders.cache 2>/dev/null | head -n1)
          if [ -n "$CACHE" ]; then
            export GDK_PIXBUF_MODULE_FILE="$CACHE"
          fi
          exec "$DIR/cview-bin" "$@"
          EOF
          chmod +x "$APP_DIR/Contents/MacOS/cview"

          # Info.plist
          VERSION="${{ needs.create-release.outputs.version }}"
          cat > "$APP_DIR/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>cview</string>
              <key>CFBundleIdentifier</key>
              <string>org.mavensgroup.cview</string>
              <key>CFBundleName</key>
              <string>CView</string>
              <key>CFBundleShortVersionString</key>
              <string>$VERSION</string>
              <key>CFBundleVersion</key>
              <string>$VERSION</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
          </dict>
          </plist>
          EOF

          # Final ad-hoc signature over the whole bundle
          codesign --force --deep --sign - "$APP_DIR"
          codesign --verify --verbose "$APP_DIR" || true

          DMG="cview-macos-${{ matrix.arch }}.dmg"
          hdiutil create -volname CView -srcfolder "$APP_DIR" -ov -format UDZO "$DMG"
          shasum -a 256 "$DMG" > "$DMG.sha256"

      - name: Upload macOS DMG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          DMG="cview-macos-${{ matrix.arch }}.dmg"
          gh release upload "${{ github.ref_name }}" "$DMG" "$DMG.sha256"

  # ---------------------------------------------------------------------------
  # Flatpak
  # ---------------------------------------------------------------------------
  build-flatpak:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder python3-pip
          pip3 install --break-system-packages tomlkit aiohttp

          sudo flatpak remote-add --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

          # 25.08 rust-stable extension matches the GNOME 49 base
          sudo flatpak install -y --noninteractive flathub \
            org.gnome.Sdk//49 \
            org.gnome.Platform//49 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Generate cargo sources
        run: |
          set -e
          curl -O https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py
          python3 flatpak-cargo-generator.py ./Cargo.lock -o cargo-sources.json

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: cview.flatpak
          manifest-path: org.mavensgroup.cview.yml
          cache-key: flatpak-builder-${{ github.sha }}
          # Runtimes were already installed with sudo above
          install-deps-from: false

      - name: Upload Flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          sha256sum cview.flatpak > cview.flatpak.sha256
          gh release upload "${{ github.ref_name }}" cview.flatpak cview.flatpak.sha256

  # ---------------------------------------------------------------------------
  # DEB — must be ubuntu-24.04 or newer. Jammy (22.04) ships libadwaita 1.1,
  # but the `adw` crate's v1_5 feature requires libadwaita-1 >= 1.5.
  # Consequence: the resulting .deb needs glibc 2.39+ (Ubuntu 24.04 / Debian 13).
  # ---------------------------------------------------------------------------
  build-deb:
    name: Build DEB
    needs: create-release
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install System Dependencies
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev
          pkg-config --modversion libadwaita-1   # sanity check: must be >= 1.5

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build Binary
        run: cargo build --release --locked

      - name: Build DEB
        run: |
          set -e
          cargo deb --no-build --output target/debian/cview.deb
          sha256sum target/debian/cview.deb > target/debian/cview.deb.sha256

      - name: Upload DEB
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload "${{ github.ref_name }}" \
            target/debian/cview.deb target/debian/cview.deb.sha256

  # ---------------------------------------------------------------------------
  # RPM — must be built inside a Fedora container. cargo-generate-rpm with
  # auto-req resolves dependency names against the host package database, so
  # building on Ubuntu produces requires that no RPM distro can satisfy.
  # ---------------------------------------------------------------------------
  build-rpm:
    name: Build RPM
    needs: create-release
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    steps:
      - name: Install toolchain and dependencies
        run: |
          set -e
          dnf -y install \
            gcc gcc-c++ make pkgconf-pkg-config \
            rust cargo \
            gtk4-devel libadwaita-devel \
            rpm-build gh git tar findutils

      - uses: actions/checkout@v4

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked

      - name: Build Binary
        run: cargo build --release --locked

      - name: Build RPM
        run: |
          set -e
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo generate-rpm
          mv target/generate-rpm/*.rpm target/generate-rpm/cview.rpm
          sha256sum target/generate-rpm/cview.rpm > target/generate-rpm/cview.rpm.sha256

      - name: Upload RPM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload "${{ github.ref_name }}" \
            target/generate-rpm/cview.rpm target/generate-rpm/cview.rpm.sha256

  # ---------------------------------------------------------------------------
  # Publish the draft only if every build succeeded. test-v* tags stay drafts.
  # ---------------------------------------------------------------------------
  finalize:
    needs:
      - create-release
      - build-windows
      - build-macos
      - build-flatpak
      - build-deb
      - build-rpm
    runs-on: ubuntu-latest
    if: startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/checkout@v4

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" --draft=false
