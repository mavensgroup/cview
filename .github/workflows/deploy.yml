name: Deploy Documentation
on:
  push:
    tags:
      - 'd*'
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
      - name: Cache mdBook
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/mdbook
          key: mdbook-0.5.2-${{ runner.os }}
      - name: Install mdBook
        run: command -v mdbook || cargo install mdbook --version 0.5.2
      # Check initial state
      - name: Check initial structure
        run: |
          echo "=== docs/ directory ==="
          ls -la docs/
          echo "=== docs/src/ directory ==="
          ls -la docs/src/
          echo "=== book.toml content ==="
          cat docs/book.toml
      # Build the book with verbose output
      - name: Build Book
        working-directory: docs
        run: RUST_LOG=debug mdbook build .
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book
